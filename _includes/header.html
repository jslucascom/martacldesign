<!-- ==========================  NAVIGATION  ========================== -->
<!-- Shared across every page. Edit once here. -->
<header class="site-nav fixed-top">
	<div class="container-xxl">
		<nav class="navbar navbar-expand-lg py-3" aria-label="Primary">
			<a class="navbar-brand d-flex align-items-center" href="/" aria-label="Marta Colmenero — home">
				<img src="/assets/images/logo.svg" alt="Marta Colmenero" class="brand-logo" />
			</a>

			<div class="d-flex align-items-center ms-auto d-lg-none">
				<button type="button" class="theme-toggle nav-toggle-mobile" aria-label="Toggle dark mode"
					aria-pressed="false">
					<img src="/assets/images/toggle-light.svg" alt="" class="toggle-img toggle-img--light" />
					<img src="/assets/images/toggle-dark.svg" alt="" class="toggle-img toggle-img--dark" />
				</button>
				<button class="navbar-toggler border-0 p-0" type="button" data-bs-toggle="offcanvas"
					data-bs-target="#mobileMenu" aria-controls="mobileMenu" aria-label="Open menu">
					<img src="/assets/images/menu.svg" alt="" class="icon-24 theme-icon" />
				</button>
			</div>

			<div class="collapse navbar-collapse" id="primaryNav">
				<ul class="navbar-nav ms-auto align-items-lg-center gap-lg-4">
					<li class="nav-item"><a class="nav-link" href="/work/"{% if page.nav == "work" %} aria-current="page"{% endif %}>Work</a></li>
					<li class="nav-item"><a class="nav-link" href="/about.html"{% if page.nav == "about" %} aria-current="page"{% endif %}>About</a></li>
					<li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
					<li class="nav-item ms-lg-2">
						<button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode"
							aria-pressed="false">
							<img src="/assets/images/toggle-light.svg" alt="" class="toggle-img toggle-img--light" />
							<img src="/assets/images/toggle-dark.svg" alt="" class="toggle-img toggle-img--dark" />
						</button>
					</li>
					<li class="nav-item ms-lg-2">
						<a class="btn btn-primary btn-cv" href="/assets/cv/cv-martacolmenero.pdf" target="_blank" rel="noopener">Download my CV</a>
					</li>
				</ul>
			</div>
		</nav>
	</div>
</header>

<!-- ==========================  MOBILE OFFCANVAS  ========================== -->
<div class="offcanvas offcanvas-end mobile-menu" tabindex="-1" id="mobileMenu" aria-labelledby="mobileMenuLabel">
	<div class="offcanvas-header">
		<a class="mobile-menu-brand" href="/" id="mobileMenuLabel" data-bs-dismiss="offcanvas"
			aria-label="Marta Colmenero — home">
			<img src="/assets/images/logo.svg" alt="Marta Colmenero" class="brand-logo" />
		</a>
		<div class="offcanvas-header-actions">
			<button type="button" class="theme-toggle" aria-label="Toggle dark mode" aria-pressed="false">
				<img src="/assets/images/toggle-light.svg" alt="" class="toggle-img toggle-img--light" />
				<img src="/assets/images/toggle-dark.svg" alt="" class="toggle-img toggle-img--dark" />
			</button>
			<button type="button" class="btn-close-custom" data-bs-dismiss="offcanvas" aria-label="Close">
				<img src="/assets/images/close.svg" alt="" class="icon-24 theme-icon" />
			</button>
		</div>
	</div>
	<div class="offcanvas-body d-flex flex-column">
		<ul class="nav flex-column mobile-nav">
			<li><a class="nav-link" href="/">Homepage</a></li>
			<li><a class="nav-link" href="/work/">Work</a></li>
			<li><a class="nav-link" href="/about.html">About</a></li>
			<li><a class="nav-link" href="#contact">Contact</a></li>
		</ul>
		<div class="mt-auto pt-4 d-flex flex-column gap-3">
			<a class="btn btn-primary btn-cv" href="/assets/cv/cv-martacolmenero.pdf" target="_blank" rel="noopener">Download my CV</a>
		</div>
	</div>
</div>
