<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
	<meta name="theme-color" content="#FBF8F7" media="(prefers-color-scheme: light)" />
	<meta name="theme-color" content="#160D0D" media="(prefers-color-scheme: dark)" />

	<title>{{ page.title }}</title>
	<meta name="description" content="{{ page.description }}" />

	<!-- Open Graph / social sharing -->
	<meta property="og:type" content="website" />
	<meta property="og:site_name" content="Marta Colmenero" />
	<meta property="og:title" content="{{ page.title }}" />
	<meta property="og:description" content="{{ page.description }}" />
	<meta property="og:url" content="{{ site.url }}{{ page.url }}" />
	<meta property="og:image" content="{{ site.url }}/assets/images/social-card.png" />
	<meta property="og:image:width" content="2400" />
	<meta property="og:image:height" content="1260" />
	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="{{ page.title }}" />
	<meta name="twitter:description" content="{{ page.description }}" />
	<meta name="twitter:image" content="{{ site.url }}/assets/images/social-card.png" />
	<link rel="canonical" href="{{ site.url }}{{ page.url }}" />

	<!-- Theme initialiser: runs before paint to avoid flash of incorrect theme -->
	<script>(function () { document.documentElement.classList.add('js'); try { var stored = localStorage.getItem('marta-theme'); if (stored === 'dark' || stored === 'light') { document.documentElement.setAttribute('data-bs-theme', stored); } } catch (_) { } })();</script>

	<!-- Bootstrap 5.3 -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

	<!-- Google Fonts: Castoro (serif) + Inter (sans) -->
	<link rel="preconnect" href="https://fonts.googleapis.com" />
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
	<link href="https://fonts.googleapis.com/css2?family=Castoro:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

	<link rel="icon" type="image/svg+xml" href="/assets/images/favicon.svg" />
	<link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png" />
	<link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16.png" />
	<link rel="apple-touch-icon" sizes="192x192" href="/assets/images/favicon-192.png" />{% if page.swiper %}<!-- Swiper (testimonials carousel) -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />{% endif %}<link rel="stylesheet" href="/assets/css/styles.css" />{% if page.gsap %}
	<!-- GSAP: hide animated elements before JS runs (html.js = JS available) -->
	<style>
	html.js .hero-avatar,
	html.js .hero-eyebrow,
	html.js .hero-title,
	html.js .hero-actions,
	html.js .work-card__media,
	html.js .work-card__title,
	html.js .work-card__meta,
	html.js .section-title,
	html.js .human-portrait-wrap,
	html.js .lead-para,
	html.js .section-human .col-12.col-lg-7 p,
	html.js .section-testimonials,
	html.js .section-contact { opacity: 0; }
	</style>
	<!-- GSAP core + ScrollTrigger + SplitText (served locally from node_modules) -->
	<script src="/assets/js/gsap.min.js"></script>
	<script src="/assets/js/ScrollTrigger.min.js"></script>
	<script src="/assets/js/SplitText.min.js"></script>{% endif %}
</head>

<body>{% include header.html %}

	<main id="top">{{ content }}</main>

	{% include footer.html %}

	<!-- Bootstrap bundle (Popper + JS) -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>{% if page.swiper %}<!-- Swiper (testimonials carousel) -->
	<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>{% endif %}<script src="/assets/js/script.js"></script>{% if page.gsap %}
	<script src="/assets/js/animations.js"></script>{% endif %}
</body>

</html>
